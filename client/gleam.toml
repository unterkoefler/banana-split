name = "app"
version = "1.0.0"
target = "javascript"

# Fill out these fields if you intend to generate HTML documentation or publish
# your project to the Hex package manager.
#
# description = ""
# licences = ["Apache-2.0"]
# repository = { type = "github", user = "", repo = "" }
# links = [{ title = "Website", href = "" }]
#
# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
vec = ">= 3.2.0 and < 4.0.0"
lustre = ">= 5.6.0 and < 6.0.0"
prng = ">= 5.1.0 and < 6.0.0"
gleam_time = ">= 1.7.0 and < 2.0.0"
gleam_regexp = ">= 1.1.1 and < 2.0.0"
plinth = ">= 0.9.3 and < 1.0.0"
rsvp = ">= 1.2.0 and < 2.0.0"
modem = ">= 2.1.2 and < 3.0.0"
lustre_websocket = { git = "https://github.com/bchase/lustre_websocket", ref = "3382c81c8d708c73e2f2649ebd8b937e4917cbc0" }
shared = { "path" = "../shared" }
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
vec_json = ">= 4.0.1 and < 5.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
mascarpone = ">= 3.0.0 and < 4.0.0"
lustre_dev_tools = ">= 2.3.4 and < 3.0.0"


[tools.lustre.html]
scripts = [
  { type = "importmap", content = "{ \"imports\": { \"three\": \"https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js\", \"three/addons/\": \"https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/\", \"@dimforge/rapier3d-compat\": \"https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.11.2/+esm\" } }" }
]
stylesheets = [
  { content = "body { margin: 0; overflow: hidden; } #ui { position: fixed; inset: 0; }" },
  { href = "/index.css" }
]
body = "<div id=\"ui\"></div>"
